name: Test Workflow
on: [push]
jobs:
  test:
    name: Test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from repository
        uses: actions/checkout@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Print Node.js information
        run: node --version
      - name: Install package
        run: npm ci
      - name: Run unit tests
        run: npm test
